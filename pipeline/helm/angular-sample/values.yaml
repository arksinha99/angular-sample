# Default values for angular-sample.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
fullnameOverride: ""
namespace: 
imagePullSecrets: 
nameOverride: ""

deployment:
  replicaCount: 1
  progressDeadlineSeconds: 300
  updatePeriodSeconds: 1
  rollingStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  containers:
    image:
      repository: arkdockerregistry.azurecr.io/angularnginxui
      tag: latest
      ImagePullPolicy: Always
    name: angularnginxui
    securityContext: {}
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 250m
      memory: 128Mi

service:
  metadata:
    name: angularnginxui
  port: 4200
  type: LoadBalancer

ingress:
  enabled: true
  ingressClassName: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
       - path: /
         pathType: Prefix
  tls:
    - secretName: chart-example-tls
      hosts:
        - chart-example.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Environment variables for the application
env: []
  # - name: ENVIRONMENT
  #   value: "production"
  # - name: DEBUG_MODE
  #   value: "false"


# ConfigMap for application configuration
configMap:
  enabled: false
  data: {}
    # app-config.json: |
    #   {}

# Secrets for sensitive data
secrets:
  enabled: false
  data: {}

nodeSelector: {}

tolerations: []

affinity: {}
